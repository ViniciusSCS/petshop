version: "3.9"

services:

  # 🔹 BACKEND (Laravel)
  api:
    container_name: petshop-php
    build:
      context: ./petshop_back
      dockerfile: ./docker/php/Dockerfile
    restart: unless-stopped
    working_dir: /var/www/
    volumes:
      - ./petshop_back/back:/var/www
      - ./petshop_back/docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - petshop-network

  # 🔹 NGINX (Laravel)
  nginx:
    container_name: petshop-nginx
    build:
      context: ./petshop_back/docker/nginx
    restart: unless-stopped
    ports:
      - "8010:80"
    volumes:
      - ./petshop_back/back:/var/www
      - ./petshop_back/docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - petshop-network

  # 🔹 MYSQL
  db_petshop:
    container_name: petshop-mysql
    image: mysql:8.0
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - ./petshop_back/back/.docker/mysql/dbdata:/var/lib/mysql
    networks:
      - petshop-network

  # 🔹 FRONTEND
  frontend:
    container_name: petshop-frontend
    build:
      context: ./petshop_front
    ports:
      - "3011:8080"
    volumes:
      - ./petshop_front:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true
    depends_on:
      - api
    networks:
      - petshop-network

networks:
  petshop-network:
    driver: bridge